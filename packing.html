<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packing Lists - Mood Travel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="fas fa-globe-americas me-2"></i>Mood Travel</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Home</a>
                <a class="nav-link" href="/reviews"><i class="fas fa-star me-1"></i>Reviews</a>
                <a class="nav-link" href="/bus_tours"><i class="fas fa-bus me-1"></i>Bus Tours</a>
                <a class="nav-link" href="#" onclick="goBack()"><i class="fas fa-arrow-left me-1"></i>Back</a>
            </div>
        </div>
    </nav>

    <div class="hero-section text-center py-5" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3"><i class="fas fa-suitcase me-3"></i>Packing Lists</h1>
            <p class="lead mb-4">Generate comprehensive packing lists for your destination</p>
        </div>
    </div>

    <div class="container my-5">
        <!-- Packing List Generator -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h4><i class="fas fa-cog me-2"></i>Generate Packing List</h4>
                        <div class="row">
                            <div class="col-md-3">
                                <label class="form-label">Country</label>
                                <select id="countrySelect" class="form-select">
                                    <option value="">Choose country...</option>
                                    <option value="India">India</option>
                                    <option value="Switzerland">Switzerland</option>
                                    <option value="France">France</option>
                                    <option value="Japan">Japan</option>
                                    <option value="Australia">Australia</option>
                                    <option value="USA">USA</option>
                                    <option value="Thailand">Thailand</option>
                                    <option value="Italy">Italy</option>
                                    <option value="Spain">Spain</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Duration (days)</label>
                                <input type="number" id="durationInput" class="form-control" min="1" max="30" value="7">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Season</label>
                                <select id="seasonSelect" class="form-select">
                                    <option value="summer">Summer</option>
                                    <option value="winter">Winter</option>
                                    <option value="spring">Spring</option>
                                    <option value="autumn">Autumn</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Activities</label>
                                <select id="activitiesSelect" class="form-select" multiple>
                                    <option value="hiking">Hiking</option>
                                    <option value="swimming">Swimming</option>
                                    <option value="photography">Photography</option>
                                    <option value="skiing">Skiing</option>
                                    <option value="cycling">Cycling</option>
                                    <option value="beach">Beach</option>
                                    <option value="city">City Exploration</option>
                                    <option value="cultural">Cultural Visits</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-12">
                                <button class="btn btn-primary" onclick="generatePackingList()">
                                    <i class="fas fa-magic me-1"></i>Generate Packing List
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Packing List Display -->
        <div id="packingListContainer">
            <div class="text-center py-5">
                <i class="fas fa-suitcase fa-3x text-muted mb-3"></i>
                <h4>Generate your personalized packing list</h4>
                <p class="text-muted">Select your destination and preferences to get started</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function goBack() {
            window.history.back();
        }

        async function generatePackingList() {
            const country = document.getElementById('countrySelect').value;
            const duration = parseInt(document.getElementById('durationInput').value);
            const season = document.getElementById('seasonSelect').value;
            const activities = Array.from(document.getElementById('activitiesSelect').selectedOptions).map(option => option.value);

            if (!country) {
                alert('Please select a country');
                return;
            }

            if (!duration || duration < 1) {
                alert('Please enter a valid duration');
                return;
            }

            try {
                const response = await fetch('/api/packing/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        country: country,
                        duration: duration,
                        season: season,
                        activities: activities
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    displayPackingList(data, country, duration, season, activities);
                } else {
                    showError('Failed to generate packing list');
                }
            } catch (error) {
                console.error('Error generating packing list:', error);
                showError('An error occurred while generating the packing list');
            }
        }

        function displayPackingList(packingData, country, duration, season, activities) {
            const container = document.getElementById('packingListContainer');
            
            // Check if we have the expected data structure
            if (!packingData.packing_list) {
                showError('Invalid packing list data received');
                return;
            }
            
            const packingList = packingData.packing_list;
            
            container.innerHTML = `
                <div class="row">
                    <div class="col-12 mb-4">
                        <div class="card">
                            <div class="card-header bg-primary text-white">
                                <h4><i class="fas fa-suitcase me-2"></i>Packing List for ${country}</h4>
                                <p class="mb-0">${duration} days | ${season.charAt(0).toUpperCase() + season.slice(1)} | ${activities.join(', ') || 'General travel'}</p>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <button class="btn btn-outline-primary mb-3" onclick="printPackingList()">
                                            <i class="fas fa-print me-1"></i>Print List
                                        </button>
                                    </div>
                                    <div class="col-md-6 text-end">
                                        <button class="btn btn-outline-success mb-3" onclick="downloadPackingList()">
                                            <i class="fas fa-download me-1"></i>Download PDF
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    ${Object.entries(packingList).map(([category, items]) => `
                        <div class="col-lg-6 col-xl-4 mb-4">
                            <div class="card h-100">
                                <div class="card-header">
                                    <h5 class="card-title mb-0">
                                        <i class="fas ${getCategoryIcon(category)} me-2"></i>${formatCategoryName(category)}
                                    </h5>
                                </div>
                                <div class="card-body">
                                    <ul class="list-group list-group-flush">
                                        ${Array.isArray(items) ? items.map(item => `
                                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                                <span>${item}</span>
                                                <div class="form-check">
                                                    <input class="form-check-input" type="checkbox" id="item_${item.replace(/\s+/g, '_')}">
                                                    <label class="form-check-label" for="item_${item.replace(/\s+/g, '_')}">
                                                        Packed
                                                    </label>
                                                </div>
                                            </li>
                                        `).join('') : '<li class="list-group-item text-muted">No items in this category</li>'}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                ${packingData.special_notes ? `
                <div class="row mt-4">
                    <div class="col-12">
                        <div class="card border-info">
                            <div class="card-header bg-info text-white">
                                <h5><i class="fas fa-info-circle me-2"></i>Special Notes for ${country}</h5>
                            </div>
                            <div class="card-body">
                                <p class="mb-0">${packingData.special_notes}</p>
                            </div>
                        </div>
                    </div>
                </div>
                ` : ''}
                
                <div class="row mt-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header bg-info text-white">
                                <h5><i class="fas fa-lightbulb me-2"></i>Packing Tips for ${country}</h5>
                            </div>
                            <div class="card-body">
                                <p>${getPackingTips(country)}</p>
                                <div class="row">
                                    <div class="col-md-6">
                                        <h6>Weather Considerations:</h6>
                                        <ul>
                                            <li>Check local weather forecast before packing</li>
                                            <li>Pack layers for changing weather conditions</li>
                                            <li>Consider local customs and dress codes</li>
                                        </ul>
                                    </div>
                                    <div class="col-md-6">
                                        <h6>Travel Tips:</h6>
                                        <ul>
                                            <li>Pack essential items in carry-on luggage</li>
                                            <li>Keep important documents easily accessible</li>
                                            <li>Consider luggage weight restrictions</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getCategoryIcon(category) {
            const icons = {
                'essentials': 'fa-passport',
                'documents': 'fa-file-alt',
                'electronics': 'fa-laptop',
                'toiletries': 'fa-soap',
                'health_and_safety': 'fa-first-aid',
                'clothing': 'fa-tshirt',
                'activity_specific': 'fa-hiking',
                'country_specific': 'fa-map-marker-alt',
                'seasonal_items': 'fa-sun',
                'special_equipment': 'fa-tools',
                'entertainment': 'fa-book',
                'comfort_items': 'fa-pillow',
                'organization': 'fa-boxes',
                'emergency_preparedness': 'fa-exclamation-triangle'
            };
            return icons[category] || 'fa-list';
        }

        function formatCategoryName(category) {
            return category.split('_').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
        }

        function getPackingTips(country) {
            const tips = {
                'India': 'Pack light cotton clothes for hot weather. Include modest clothing for temple visits. Carry hand sanitizer and mosquito repellent.',
                'Switzerland': 'Pack layers for changing mountain weather. Include hiking gear if planning outdoor activities. Many places prefer cash payments.',
                'France': 'Pack comfortable walking shoes for city exploration. Include an umbrella for unpredictable weather. Dress stylishly for upscale venues.',
                'Japan': 'Pack comfortable walking shoes for extensive walking. Include cash as many places don\'t accept cards. Respect local customs and dress modestly.',
                'Australia': 'Pack beach gear for coastal visits. Include strong sunscreen and comfortable walking shoes. Be prepared for varied weather.',
                'USA': 'Pack comfortable walking shoes for city exploration. Include credit cards as most places accept them. Carry ID at all times.',
                'Thailand': 'Pack beach gear for island visits. Include comfortable walking shoes for temple visits. Carry cash for local markets.',
                'Italy': 'Pack comfortable walking shoes for cobblestone streets. Include modest clothing for church visits. Carry cash for smaller establishments.',
                'Spain': 'Pack comfortable walking shoes for city exploration. Include beach gear for coastal areas. Many restaurants open late for dinner.'
            };
            return tips[country] || 'Pack comfortable walking shoes and appropriate clothing for the season. Include essential travel documents and medications.';
        }

        function printPackingList() {
            window.print();
        }

        function downloadPackingList() {
            alert('PDF download feature will be available soon!');
        }

        function showError(message) {
            const container = document.getElementById('packingListContainer');
            container.innerHTML = `
                <div class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>${message}
                </div>
            `;
        }
    </script>
</body>
</html>
